<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>点击数字加1练习</title>
    <style>
       
        body {
            text-align: center;
            margin-top: 100px;
        }
        .box {
            padding: 20px 40px;
            font-size: 20px;
            cursor: pointer;
            background: #ff6666;
            color: white;
            border: none;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    
    <button class="box" onclick="addNUM()">点我数字+1</button>
    
    <button class="box" onclick="addNUM2()">点点看</button>

    <script>
       
       var num = 100; 
var num2=100
function addNUM() {
  
  alert("当前数字：" + num++);
 }
function addNUM2() {alert("当前数字：" + num2++)} 


        
       
   
   
   
      
        </script>

</body>
</html>

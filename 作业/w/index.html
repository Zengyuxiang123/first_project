<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的介绍网页</title>
    <style> 

  /* 音频容器：和图片/视频用一样的样式参数 */
  .inspire-audio-box {
    width: 200px;          /* 和图片/视频宽度一致 */
    background: #f0f0f0;   /* 统一背景色 */
    border-radius: 8px;    /* 统一圆角 */
    padding: 10px;
    text-align: center;
    margin: 20px 0;        /* 和其他模块分隔 */
  }
  /* 音频控件样式 */
  .inspire-audio-box audio {
    width: 100%;           /* 占满容器宽度 */
    border-radius: 6px;    /* 统一圆角 */
    margin: 10px 0;        /* 和文字间距 */
  }
  .inspire-audio-box p {
    font-size: 14px;
    color: #3b3838;
    margin: 0;
  }
  .media-item-sport {
    width: 200px;          /* 固定宽度（不变） */
    background: #f0f0f0;   /* 背景色（不变） */
    border-radius: 8px;    /* 圆角（不变） */
    padding: 10px;
    text-align: center;
  }
  /* 核心：仅高度改为100px，其余规则不变 */
  .media-item-sport img, 
  .media-item-sport video {
    width: 100%;           /* 占满容器宽度（不变） */
    height: 120px;         /* 仅此处改为100像素 */
    border-radius: 6px;    /* 内部圆角（不变） */
    object-fit: cover;     /* 防变形（不变） */
    display: block;        /* 消除底部空白（不变） */
  }
  /* 统一控制图片/视频的容器 */
  .media-item {
    width: 200px;          /* 固定宽度 */
    background: #f0f0f0;   /* 背景色 */
    border-radius: 8px;    /* 圆角 */
    padding: 10px;
    text-align: center;
  }
  /* 核心：视频和图片用同一套尺寸规则 */
  .media-item img, 
  .media-item video {
    width: 100%;           /* 占满容器宽度 */
    height: 270px;         /* 固定高度 */
    border-radius: 6px;    /* 内部圆角 */
    object-fit: cover;     /* 防变形 */
    display: block;        /* 消除底部空白 */
  }




        /* 新增：水平分割线样式 */
        .horizontal-line {
            border: none;
            border-top: 2px solid #ccc; /* 灰色实线，2px粗 */
            margin: 40px 0; /* 上下间距，让分割线不拥挤 */
            width: 100%; /* 全屏宽度 */
        }

        /* 新增：垂直分割线容器（用于左右区块分隔） */
        .vertical-container {
            display: flex;
            align-items: flex-start;
            gap: 30px; /* 左右区块间距 */
            padding: 20px 0;
        }

        /* 新增：垂直分割线样式 */
        .vertical-line {
            width: 2px; /* 竖线宽度 */
            height: 100%; /* 自适应容器高度 */
            background-color: #ccc; /* 灰色 */
            margin: 0 10px;
        }

        /* 原有样式保留，仅优化部分细节 */
        .image-item {
            max-width: 200px; 
            text-align: center;     
            background-color: #f0f0f0;
            padding: 10px;          
            border-radius: 8px;     
        }
        
        .image-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            padding: 20px;
            border-radius: 8px; 
        }
        
        .image-gallery {
            display: flex;      
            flex-wrap: wrap;    
            gap: 20px;          
            padding: 10px;      
        }

        .single-image img {
            width: 200px ;        
            height: auto;       
            border-radius: 8px;
        }

        .single-image p {
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
            color: #3b3838;
        }
        
        .image-item, .single-image {
            text-align: center;
            background-color: #f0f0f0;
            padding: 10px;
            border-radius: 8px;
            max-width: 200px;
            overflow: hidden;
        }

        .image-item img, .single-image img {
            width: 200px;
            height: auto;
            border-radius: 8px;
            display: block;
            transition: transform 0.3s ease;
        }

        .image-item:hover img, .single-image:hover img {
            transform: scale(1.2);
        }

        /* 新增：页面整体容器，限制宽度更美观 */
        .page-container {
            max-width: 1200px;
            margin: 0 auto; /* 页面居中 */
            padding: 0 20px;
        }
    </style>
</head>
